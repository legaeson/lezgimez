name: Deploy to Beget

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test || true

      - name: Build Tailwind CSS
        run: npm run build

      - name: Prepare production build
        run: |
          rm -rf dist
          mkdir -p dist
          cp index.html dist/
          cp output.css dist/
          cp sw.js dist/
          cp words.json dist/
          cp grammar.json dist/
          cp manifest.json dist/
          cp robots.txt dist/
          cp sitemap.xml dist/
          cp favicon.ico dist/
          cp -r icons dist/
          cp -r fa dist/
          cp -r audio dist/
          cp -r api dist/
          
          # Inject secrets into the PHP script
          sed -i "s/{{TELEGRAM_BOT_TOKEN}}/${{ secrets.TELEGRAM_BOT_TOKEN }}/g" dist/api/report-word.php
          sed -i "s/{{TELEGRAM_CHAT_ID}}/${{ secrets.TELEGRAM_CHAT_ID }}/g" dist/api/report-word.php

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: ./
          dangerous-clean-slate: false
